name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    name: Security tests + checks
    runs-on: ubuntu-latest
    env:
      # The security tests stub Electron (scripts/electron-stub.mjs via
      # auth-test-loader.mjs), so the real ~100 MB Electron binary is never
      # needed — skip the download to keep installs fast and non-flaky.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    defaults:
      run:
        working-directory: redstart-nest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # chat-ui depends on @capacitor/cli (engines: node >=22) and its
          # .npmrc sets engine-strict=true, so anything below 22 fails npm ci.
          node-version: 22
          cache: npm
          cache-dependency-path: |
            redstart-nest/package-lock.json
            redstart-nest/src/chat-ui/package-lock.json

      - name: Install launcher / main-process deps
        run: npm ci

      - name: Install chat-ui deps
        run: npm ci
        working-directory: redstart-nest/src/chat-ui

      - name: Typecheck launcher (tsc --noEmit)
        run: npm run typecheck

      - name: Syntax-check electron/main (node --check)
        run: npm run check:mjs

      # path containment + symlink escape, auth/session/role hierarchy, SSRF /
      # redirect / whitelist enforcement, capability gating, and the minimal
      # beacon payload. Postgres and live-web cases self-skip when no DB /
      # network resource is present. Full svelte-check is intentionally NOT run
      # here — it reports pre-existing test-file type errors unrelated to these
      # security guarantees.
      - name: Security test suite
        run: npm run test:security
